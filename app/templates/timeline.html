{% extends "base.html" %}

{% block content %}
<div class="profile">
    <h1>{{ title }}</h1>
</div>

<section class="section">
    <h2>Add a Post</h2>
    <form id="timeline-form" class="timeline-form">
        <div class="form-group">
            <label for="name">Name</label>
            <input type="text" id="name" name="name" required>
        </div>
        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required>
        </div>
        <div class="form-group">
            <label for="content">Message</label>
            <textarea id="content" name="content" rows="4" required></textarea>
        </div>
        <button type="submit">Post</button>
    </form>
</section>

<section class="section">
    <h2>Timeline</h2>
    <div id="timeline-posts"></div>
</section>

<script>
    const form = document.getElementById('timeline-form');
    const postsContainer = document.getElementById('timeline-posts');

    // Build a Gravatar URL from an email: hash the normalized email and
    // let Gravatar serve that person's avatar (or an identicon fallback)
    async function gravatarUrl(email, size) {
        const normalized = email.trim().toLowerCase();
        const bytes = new TextEncoder().encode(normalized);
        const digest = await crypto.subtle.digest('SHA-256', bytes);
        const hash = Array.from(new Uint8Array(digest))
            .map(function (b) { return b.toString(16).padStart(2, '0'); })
            .join('');
        return 'https://www.gravatar.com/avatar/' + hash + '?s=' + size + '&d=identicon';
    }

    // Fetch all posts from the GET endpoint and render them
    async function loadPosts() {
        const response = await fetch('/api/timeline_post');
        const data = await response.json();

        postsContainer.innerHTML = '';
        data.timeline_posts.forEach(function (post) {
            const card = document.createElement('div');
            card.className = 'entry-card';
            card.innerHTML =
                '<img class="entry-avatar" width="80" height="80" alt="">' +
                '<h4 class="entry-title">' + post.name + '</h4>' +
                '<p class="entry-subtitle">' + post.email + '</p>' +
                '<p class="entry-dates">' + post.created_at + '</p>' +
                '<p></p>';
            // Use textContent for the message so user input can't inject HTML
            card.querySelector('p:last-child').textContent = post.content;
            // Fill in the avatar once its hash has been computed
            gravatarUrl(post.email, 80).then(function (url) {
                card.querySelector('.entry-avatar').src = url;
            });
            postsContainer.appendChild(card);
        });
    }

    // Send the form to the POST endpoint, then refresh the list.
    form.addEventListener('submit', async function (event) {
        event.preventDefault();
        await fetch('/api/timeline_post', {
            method: 'POST',
            body: new FormData(form)
        });
        form.reset();
        loadPosts();
    });

    loadPosts();
</script>
{% endblock %}
