{% extends "base.html" %}
{% block content %}
<div class="profile">
    <div id="profile-picture" class="profile-picture">
        <img src="{{ url_for('static', filename='img/logo.jpg') }}">
    </div>
    <h1>{{ title }}</h1>
</div>
<div class="hobbies">
    <h2>Hobbies</h2>
    <ul>
        {% for hobby in hobbies %}
        <li>{{ hobby }}</li>
        {% endfor %}
    </ul>
</div>
{% endblock %}
